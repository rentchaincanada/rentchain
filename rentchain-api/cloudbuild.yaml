substitutions:
  _REGION: us-central1
  _SERVICE: rentchain-landlord-api
  _REPO: rentchain-api
  _IMAGE: rentchain-landlord-api
  _IMAGE_TAG: "${SHORT_SHA}"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-lc"
      - |
        set -euxo pipefail
        echo "==== ENV (first 120) ===="
        env | sort | sed -n '1,120p'
        echo "==== PWD/FILES ===="
        pwd
        ls -la
        echo "==== ROOT ===="
        ls -la /workspace
        echo "==== API DIR ===="
        ls -la /workspace/rentchain-api

  - name: "node:20"
    dir: "rentchain-api"
    entrypoint: "bash"
    args:
      - "-lc"
      - |
        set -euxo pipefail
        npm ci
        npm run build

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ -z "${_IMAGE_TAG}" ]; then
          echo "ERROR: _IMAGE_TAG is empty. Provide --substitutions=_IMAGE_TAG=xxxx"
          exit 1
        fi
        echo "Using _IMAGE_TAG=${_IMAGE_TAG}"

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-f",
        "rentchain-api/Dockerfile",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:${_IMAGE_TAG}",
        "rentchain-api"
      ]

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:${_IMAGE_TAG}"
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-lc"
      - |
        set -euxo pipefail
        gcloud run deploy "${_SERVICE}" \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:${_IMAGE_TAG}" \
          --region "${_REGION}" \
          --platform managed \
          --allow-unauthenticated
