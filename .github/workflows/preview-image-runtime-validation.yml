name: Preview image runtime validation

on:
  pull_request:
    paths:
      - "rentchain-api/Dockerfile"
      - "rentchain-api/package.json"
      - "rentchain-api/package-lock.json"
      - ".github/workflows/preview-deployment-identity-validation.yml"
      - ".github/workflows/preview-image-runtime-validation.yml"

permissions:
  contents: read

jobs:
  runtime-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build and inspect final runtime filesystem
        shell: bash
        run: |
          set -euo pipefail
          image="rentchain-preview-runtime-validation:${GITHUB_SHA}"
          docker buildx build --file rentchain-api/Dockerfile --platform linux/amd64 --tag "${image}" --load rentchain-api
          docker image inspect "${image}" | jq -e '
            .[0].Architecture == "amd64" and
            .[0].Config.WorkingDir == "/app" and
            .[0].Config.User != "" and
            .[0].Config.User != "root" and
            .[0].Config.Cmd == ["node", "dist/index.build.js"] and
            .[0].Config.ExposedPorts["8080/tcp"] == {}
          ' >/dev/null
          container="$(docker create "${image}")"
          rootfs="${RUNNER_TEMP}/preview-runtime-rootfs"
          mkdir -p "${rootfs}"
          trap 'docker rm -f "${container}" >/dev/null 2>&1 || true; rm -rf "${rootfs}"' EXIT
          docker cp "${container}:/app" "${rootfs}/app"
          test -f "${rootfs}/app/package.json"
          test -f "${rootfs}/app/package-lock.json"
          test -f "${rootfs}/app/dist/index.build.js"
          test -d "${rootfs}/app/node_modules"
          test ! -e "${rootfs}/app/src"
          test ! -e "${rootfs}/app/tests"
          test ! -e "${rootfs}/app/tsconfig.json"
          test ! -e "${rootfs}/app/node_modules/typescript"
          if find "${rootfs}/app" -type f \( -name '.env' -o -name '.env.*' -o -name '*.pem' -o -name '*.key' -o -name '*service-account*.json' -o -name 'credentials*.json' \) | grep -q .; then
            echo 'Prohibited embedded file found' >&2
            exit 1
          fi
          if rg --text -l -uuu -g '!node_modules/**' -e '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----' -e '"type"\s*:\s*"service_account"' -e '"private_key_id"\s*:' "${rootfs}/app" | grep -q .; then
            echo 'Credential pattern found' >&2
            exit 1
          fi
      - name: Smoke-test runtime health
        shell: bash
        run: |
          set -euo pipefail
          image="rentchain-preview-runtime-validation:${GITHUB_SHA}"
          name="preview-runtime-smoke-${GITHUB_RUN_ID}"
          dump_diagnostics() {
            docker inspect "${name}" --format 'status={{.State.Status}} running={{.State.Running}} exit={{.State.ExitCode}} oom={{.State.OOMKilled}} restart={{.RestartCount}}' 2>/dev/null || true
            docker port "${name}" 8080/tcp 2>/dev/null || true
            docker logs --tail 100 "${name}" 2>&1 || true
            docker rm -f "${name}" >/dev/null 2>&1 || true
          }
          trap dump_diagnostics EXIT
          docker run --detach --name "${name}" --publish 127.0.0.1::8080 --env APP_ENV=preview --env GOOGLE_CLOUD_PROJECT=rentchain-preview --env FIRESTORE_ENABLED=false --env NODE_ENV=production --env PORT=8080 "${image}" >/dev/null
          port="$(docker port "${name}" 8080/tcp | awk -F: 'NR == 1 { print $NF }')"
          [[ "${port}" =~ ^[0-9]+$ ]]
          ready=false
          max_attempts=30
          for attempt in $(seq 1 "${max_attempts}"); do
            if ! docker inspect "${name}" --format '{{.State.Running}}' | grep -qx true; then
              echo 'Container exited before readiness.' >&2
              docker inspect "${name}" --format 'status={{.State.Status}} exit={{.State.ExitCode}}' >&2 || true
              docker logs --tail 100 "${name}" >&2 || true
              exit 1
            fi
            ready_body="${RUNNER_TEMP}/preview-ready.json"
            ready_status=""
            ready_curl_exit=0
            if ready_status="$(curl --silent --show-error --output "${ready_body}" --write-out '%{http_code}' --max-time 2 "http://127.0.0.1:${port}/health/ready")"; then :; else ready_curl_exit=$?; fi
            if test "${ready_status}" = 503 && jq -e '.status == "fail" and .service == "rentchain-api" and .environment == "preview" and .mode == "foundation" and .checks.routes == "ok" and .checks.datastore == "deferred"' "${ready_body}" >/dev/null; then ready=true; break; fi
            if test "${attempt}" = "${max_attempts}"; then
              echo "Readiness probe failed: attempt=${attempt}/${max_attempts} curl_exit=${ready_curl_exit} http_status=${ready_status:-none} response_body=$(test -s "${ready_body}" && echo present || echo absent) url=http://127.0.0.1:${port}/health/ready" >&2
              docker inspect "${name}" --format 'status={{.State.Status}} running={{.State.Running}} exit={{.State.ExitCode}}' >&2 || true
              docker logs --tail 100 "${name}" >&2 || true
              exit 1
            fi
            sleep 1
          done
          test "${ready}" = true
          health=false
          for attempt in $(seq 1 "${max_attempts}"); do
            if ! docker inspect "${name}" --format '{{.State.Running}}' | grep -qx true; then
              echo 'Container exited before liveness.' >&2
              docker inspect "${name}" --format 'status={{.State.Status}} exit={{.State.ExitCode}}' >&2 || true
              docker logs --tail 100 "${name}" >&2 || true
              exit 1
            fi
            health_body="${RUNNER_TEMP}/preview-health.json"
            health_status=""
            health_curl_exit=0
            if health_status="$(curl --silent --show-error --output "${health_body}" --write-out '%{http_code}' --max-time 2 "http://127.0.0.1:${port}/health")"; then :; else health_curl_exit=$?; fi
            if test "${health_status}" = 200 && jq -e '.ok == true' "${health_body}" >/dev/null; then health=true; break; fi
            if test "${attempt}" = "${max_attempts}"; then
              echo "Liveness probe failed: attempt=${attempt}/${max_attempts} curl_exit=${health_curl_exit} http_status=${health_status:-none} response_body=$(test -s "${health_body}" && echo present || echo absent) url=http://127.0.0.1:${port}/health" >&2
              docker inspect "${name}" --format 'status={{.State.Status}} running={{.State.Running}} exit={{.State.ExitCode}}' >&2 || true
              docker logs --tail 100 "${name}" >&2 || true
              exit 1
            fi
            sleep 1
          done
          test "${health}" = true
