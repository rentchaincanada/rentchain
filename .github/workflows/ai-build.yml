name: "ai-build"

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          cache: "npm"
          cache-dependency-path: |
            rentchain-api/package-lock.json
            rentchain-frontend/package-lock.json

      - name: Install + test + build frontend
        working-directory: rentchain-frontend
        env:
          CI: "true"
          VITE_API_BASE_URL: "http://localhost:3000"
        run: |
          npm ci
          npm run test
          npm run build

      - name: Install + build api
        working-directory: rentchain-api
        run: |
          npm ci
          npm run build
