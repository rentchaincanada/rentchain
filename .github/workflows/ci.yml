name: ci

on:
  pull_request:
  push:
    branches:
      - "feat/**"
      - "fix/**"
      - "docs/**"
      - "chore/**"
      - "hotfix/**"
      - "refactor/**"
      - "perf/**"
      - "harden/**"
      - "test/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rentchain-api
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: rentchain-api/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        env:
          CI: "true"
        run: npm run test

      - name: Build backend
        run: npm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rentchain-frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: rentchain-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        env:
          CI: "true"
          VITE_API_BASE_URL: "http://localhost:3000"
        run: npm run test

      - name: Build frontend
        env:
          VITE_API_BASE_URL: "http://localhost:3000"
        run: npm run build
