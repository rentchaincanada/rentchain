name: codex-pr-review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: codex-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
      codex_enabled: ${{ steps.codex_secret_check.outputs.available }}
    steps:
      - name: Check out PR merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Pre-fetch base and head refs
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Check Codex secret availability
        id: codex_secret_check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Codex PR Review"
              echo "Skipping Codex review because \`OPENAI_API_KEY\` is not configured."
              echo "This workflow is intentionally non-blocking when the review secret is absent."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run Codex PR review
        id: run_codex
        if: steps.codex_secret_check.outputs.available == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: read-only
          prompt: |
            Review this RentChain pull request.

            Follow these repo guidance files in order:
            1. AGENTS.md
            2. PROCESS.md
            3. codex.md

            Review only the changes introduced by this pull request.
            Prioritize bugs, regressions, security issues, scope leakage, and missing verification.
            Be concise and specific.

            Base SHA: ${{ github.event.pull_request.base.sha }}
            Head SHA: ${{ github.event.pull_request.head.sha }}
            PR title: ${{ github.event.pull_request.title }}
            PR body:
            ${{ github.event.pull_request.body }}

  post-review-comment:
    runs-on: ubuntu-latest
    needs: codex-review
    if: needs.codex-review.outputs.codex_enabled == 'true' && needs.codex-review.outputs.final_message != ''
    steps:
      - name: Post Codex review comment
        uses: actions/github-script@v7
        env:
          CODEX_REVIEW_BODY: ${{ needs.codex-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = "<!-- rentchain-codex-pr-review -->";
            const body = `${marker}\n## Codex PR Review\n\n${process.env.CODEX_REVIEW_BODY}`;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
