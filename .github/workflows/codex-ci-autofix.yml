name: codex-ci-autofix

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: codex-ci-autofix-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  autofix:
    if: >
      github.event.workflow_run.conclusion == 'failure' ||
      github.event.workflow_run.conclusion == 'timed_out' ||
      github.event.workflow_run.conclusion == 'action_required'
    runs-on: ubuntu-latest
    env:
      MAX_AUTOFIX_ATTEMPTS: "1"
    steps:
      - name: Resolve autofix context
        id: context
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const run = context.payload.workflow_run;
            const prs = Array.isArray(run.pull_requests) ? run.pull_requests : [];
            const pr = prs[0] || null;
            const isFork = pr ? pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}` : false;

            const result = {
              should_run: false,
              skip_reason: "",
              pr_number: pr?.number ? String(pr.number) : "",
              head_branch: pr?.head.ref || run.head_branch || "",
              head_sha: run.head_sha || "",
              base_branch: pr?.base.ref || "",
              is_fork: isFork,
              html_url: run.html_url || "",
            };

            if (!pr) {
              result.skip_reason = "No pull request is associated with this failed ci run.";
            } else if (isFork) {
              result.skip_reason = "Autofix is disabled for fork-based pull requests because the workflow does not push to external branches.";
            } else {
              result.should_run = true;
            }

            for (const [key, value] of Object.entries(result)) {
              core.setOutput(key, String(value));
            }

      - name: Stop when no eligible PR branch is available
        if: steps.context.outputs.should_run != 'true'
        run: |
          {
            echo "## Codex CI Autofix"
            echo "${{ steps.context.outputs.skip_reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check Codex secret availability
        if: steps.context.outputs.should_run == 'true'
        id: secret_check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Codex CI Autofix"
              echo "Skipping autofix because \`OPENAI_API_KEY\` is not configured."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check out PR branch
        if: steps.context.outputs.should_run == 'true' && steps.secret_check.outputs.available == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.context.outputs.head_branch }}
          fetch-depth: 0

      - name: Inspect prior autofix attempts
        if: steps.context.outputs.should_run == 'true' && steps.secret_check.outputs.available == 'true'
        id: attempt_guard
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          MAX_AUTOFIX_ATTEMPTS: ${{ env.MAX_AUTOFIX_ATTEMPTS }}
        with:
          github-token: ${{ github.token }}
          script: |
            const issue_number = Number(process.env.PR_NUMBER);
            const marker = "<!-- rentchain-codex-ci-autofix -->";
            const maxAttempts = Number(process.env.MAX_AUTOFIX_ATTEMPTS || "1");
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const attempts = comments.filter((comment) => comment.body?.includes(marker)).length;
            const allowed = attempts < maxAttempts;
            core.setOutput("allowed", String(allowed));
            core.setOutput("attempts", String(attempts));
            if (!allowed) {
              core.setOutput("skip_reason", `Autofix limit reached for this pull request (${attempts}/${maxAttempts}).`);
            }

      - name: Stop when autofix attempt limit has been reached
        if: steps.attempt_guard.outputs.allowed == 'false'
        run: |
          {
            echo "## Codex CI Autofix"
            echo "${{ steps.attempt_guard.outputs.skip_reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Gather failing job context
        if: steps.attempt_guard.outputs.allowed == 'true'
        id: failure_context
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const runId = context.payload.workflow_run.id;
            const { data } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              per_page: 100,
            });

            const failingJobs = [];
            for (const job of data.jobs || []) {
              const badSteps = (job.steps || [])
                .filter((step) => ["failure", "timed_out", "cancelled", "action_required"].includes(step.conclusion))
                .map((step) => `    - ${step.name} (${step.conclusion})`);
              if (["failure", "timed_out", "cancelled", "action_required"].includes(job.conclusion)) {
                failingJobs.push(`- ${job.name} (${job.conclusion})${badSteps.length ? `\n${badSteps.join("\n")}` : ""}`);
              }
            }

            const summary = failingJobs.length
              ? failingJobs.join("\n")
              : "- No failing job details were returned by the GitHub Actions API.";

            core.setOutput("summary", summary);

      - name: Install backend dependencies
        if: steps.attempt_guard.outputs.allowed == 'true'
        working-directory: rentchain-api
        run: npm ci

      - name: Install frontend dependencies
        if: steps.attempt_guard.outputs.allowed == 'true'
        working-directory: rentchain-frontend
        run: npm ci

      - name: Run Codex autofix
        if: steps.attempt_guard.outputs.allowed == 'true'
        id: codex_autofix
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          working-directory: /github/workspace
          sandbox: workspace-write
          safety-strategy: drop-sudo
          prompt: |
            You are running a bounded CI autofix pass for the RentChain repository.

            Follow these repo guidance files in order:
            1. AGENTS.md
            2. PROCESS.md
            3. codex.md
            4. .codex/docs/pipeline.md

            Current failed workflow context:
            - workflow: ci
            - pull request: #${{ steps.context.outputs.pr_number }}
            - branch: `${{ steps.context.outputs.head_branch }}`
            - sha: `${{ steps.context.outputs.head_sha }}`
            - run URL: ${{ steps.context.outputs.html_url }}

            Failing jobs and steps:
            ${{ steps.failure_context.outputs.summary }}

            Autofix rules:
            - Repair only the CI failure context above.
            - Keep changes tightly scoped.
            - Do not broaden product scope.
            - Do not modify billing, auth core, infra, or deployment architecture beyond the CI repair need.
            - Do not auto-merge or create unrelated refactors.
            - Run the minimum relevant verification commands for any files you change.
            - Stop without forcing a change if no safe fix is apparent.

            Leave any resulting file changes in the working tree for the workflow commit step.

      - name: Commit autofix changes if any
        if: steps.attempt_guard.outputs.allowed == 'true'
        id: commit_changes
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No autofix file changes were produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git config user.name "rentchain-codex[bot]"
          git config user.email "rentchain-codex[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: codex ci autofix attempt"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push autofix commit
        if: steps.commit_changes.outputs.changed == 'true'
        run: git push -u origin "${{ steps.context.outputs.head_branch }}"

      - name: Comment with autofix outcome
        if: always() && steps.context.outputs.pr_number != ''
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          WORKFLOW_URL: ${{ steps.context.outputs.html_url }}
          FAILURE_SUMMARY: ${{ steps.failure_context.outputs.summary }}
          ATTEMPTS: ${{ steps.attempt_guard.outputs.attempts }}
          ATTEMPT_ALLOWED: ${{ steps.attempt_guard.outputs.allowed }}
          SECRET_AVAILABLE: ${{ steps.secret_check.outputs.available }}
          BRANCH_ELIGIBLE: ${{ steps.context.outputs.should_run }}
          CHANGED: ${{ steps.commit_changes.outputs.changed }}
          SKIP_REASON: ${{ steps.context.outputs.skip_reason || steps.attempt_guard.outputs.skip_reason }}
          FINAL_MESSAGE: ${{ steps.codex_autofix.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const issue_number = Number(process.env.PR_NUMBER);
            const marker = "<!-- rentchain-codex-ci-autofix -->";

            let body = `${marker}\n## Codex CI Autofix\n\n`;
            if (process.env.BRANCH_ELIGIBLE !== "true") {
              body += `${process.env.SKIP_REASON}\n`;
            } else if (process.env.SECRET_AVAILABLE !== "true") {
              body += "Autofix skipped because `OPENAI_API_KEY` is not configured.\n";
            } else if (process.env.ATTEMPT_ALLOWED !== "true") {
              body += `${process.env.SKIP_REASON}\n`;
            } else if (process.env.CHANGED === "true") {
              body += "Codex produced a bounded autofix commit on this PR branch. GitHub will rerun CI automatically.\n";
            } else {
              body += "Codex completed an autofix pass but did not produce a safe scoped fix commit.\n";
            }

            if (process.env.WORKFLOW_URL) {
              body += `\nWorkflow run: ${process.env.WORKFLOW_URL}\n`;
            }

            if (process.env.FAILURE_SUMMARY) {
              body += `\n### Failure context\n${process.env.FAILURE_SUMMARY}\n`;
            }

            if (process.env.FINAL_MESSAGE) {
              body += `\n### Codex summary\n${process.env.FINAL_MESSAGE}\n`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
