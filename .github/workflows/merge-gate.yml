name: merge-gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  checks: read
  statuses: read

jobs:
  merge-gate:
    name: merge-gate
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate required checks
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha;

            // Get PR data so we can compare against the latest commit SHA if needed
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            });

            const sha = pr.head.sha || headSha;

            // Collect check runs
            const { data: checks } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: sha,
              per_page: 100,
            });

            // Collect commit statuses
            const { data: combinedStatus } = await github.rest.repos.getCombinedStatusForRef({
              owner,
              repo,
              ref: sha,
            });

            // Define the required contexts/job names here.
            // Keep these names unique across workflows.
            const requiredChecks = [
              "ci / frontend",
              "ci / backend",
              "Vercel – rentchain",
              "merge-gate"
            ];

            // Normalize results from checks API
            const checkMap = new Map();
            for (const run of checks.check_runs) {
              checkMap.set(run.name, {
                type: "check_run",
                status: run.status,           // queued, in_progress, completed
                conclusion: run.conclusion,   // success, failure, cancelled, etc.
                html_url: run.html_url,
              });
            }

            // Normalize results from status API
            const statusMap = new Map();
            for (const s of combinedStatus.statuses) {
              statusMap.set(s.context, {
                type: "status",
                status: s.state === "pending" ? "in_progress" : "completed",
                conclusion:
                  s.state === "success"
                    ? "success"
                    : s.state === "failure" || s.state === "error"
                    ? "failure"
                    : null,
                html_url: s.target_url,
              });
            }

            const results = [];
            for (const name of requiredChecks) {
              const found = checkMap.get(name) || statusMap.get(name) || null;

              if (!found) {
                results.push({
                  name,
                  state: "pending",
                  detail: "required check not reported yet",
                });
                continue;
              }

              if (found.status !== "completed") {
                results.push({
                  name,
                  state: "pending",
                  detail: `${found.type} is ${found.status}`,
                });
                continue;
              }

              if (
                ["failure", "cancelled", "timed_out", "action_required"].includes(found.conclusion)
              ) {
                results.push({
                  name,
                  state: "failed",
                  detail: `${found.type} concluded with ${found.conclusion}`,
                });
                continue;
              }

              if (["success", "neutral", "skipped"].includes(found.conclusion)) {
                results.push({
                  name,
                  state: "passed",
                  detail: `${found.type} concluded with ${found.conclusion}`,
                });
                continue;
              }

              results.push({
                name,
                state: "pending",
                detail: `${found.type} has inconclusive result: ${found.conclusion}`,
              });
            }

            const failed = results.filter(r => r.state === "failed");
            const pending = results.filter(r => r.state === "pending");
            const passed = results.filter(r => r.state === "passed");

            core.info(`Required checks evaluated for SHA: ${sha}`);
            core.info(JSON.stringify(results, null, 2));

            if (failed.length > 0) {
              core.setFailed(
                "Merge gate failed because one or more required checks failed:\n" +
                failed.map(f => `- ${f.name}: ${f.detail}`).join("\n")
              );
              return;
            }

            if (pending.length > 0) {
              core.notice(
                "Merge gate waiting on required checks:\n" +
                pending.map(p => `- ${p.name}: ${p.detail}`).join("\n")
              );
              return;
            }

            core.notice(
              "Merge gate satisfied. All required checks passed:\n" +
              passed.map(p => `- ${p.name}`).join("\n")
            );
